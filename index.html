<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和好邀请</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="background-decoration"></div>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 开篇弹窗 -->
        <div id="openingModal" class="modal show">
            <div class="modal-content">
                <h2>你的饭我吃完了，谢谢你</h2>
                <p>但是不想洗碗</p>
                <div class="modal-buttons">
                    <button id="helpWash" class="modal-button primary">帮你洗</button>
                    <button id="selfWash" class="modal-button secondary">自己洗</button>
                </div>
            </div>
        </div>
        
        <!-- 选择结果弹窗 -->
        <div id="resultModal" class="modal">
            <div class="modal-content">
                <p id="resultMessage"></p>
                <button id="resultOk" class="modal-button primary">确定</button>
            </div>
        </div>
        
        <!-- 和好弹窗 -->
        <div id="reconcileModal" class="modal">
            <div class="modal-content">
                <h2>我们和好吧</h2>
                <div class="modal-buttons">
                    <button id="agree" class="modal-button primary">同意</button>
                    <button id="disagree" class="modal-button secondary">不同意</button>
                </div>
            </div>
        </div>
        
        <!-- 电影邀请弹窗 -->
        <div id="movieInviteModal" class="modal">
            <div class="modal-content">
                <p>哦耶 ✌，那晚上请我看电影吧</p>
                <button id="okayBtn" class="modal-button primary">好的</button>
            </div>
        </div>
        
        <!-- 电影选择弹窗 -->
        <div id="movieSelectModal" class="modal">
            <div class="modal-content">
                <h3>猜猜我想看什么电影？</h3>
                <div class="movie-buttons">
                    <button class="movie-button" data-movie="飞驰人生3">《飞驰人生3》</button>
                    <button class="movie-button" data-movie="镖人">《镖人》</button>
                    <button class="movie-button" data-movie="熊猫计划">《熊猫计划》</button>
                </div>
                <p id="movieResultMessage" class="result-message"></p>
            </div>
        </div>
        
        <!-- 结尾弹窗 -->
        <div id="endingModal" class="modal">
            <div class="modal-content">
                <div class="emoji">😘🤗</div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
